<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guides</title>
  <meta name="theme-color" content="#0a0a0a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --bg-card: #111;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #444;
      --accent: #00ff87;
      --blue: #5ccfe6;
      --yellow: #ffd060;
      --red: #ff6b6b;
      --font: 'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Consolas,'Courier New',monospace;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* TITLEBAR */
    .titlebar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: #0f0f0f;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .titlebar-text { font-size: 11px; color: var(--text-dim); margin-left: 6px; letter-spacing: 0.05em; }

    /* TERMINAL BODY */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 8px;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }
    .terminal::-webkit-scrollbar { width: 4px; }
    .terminal::-webkit-scrollbar-thumb { background: #222; }

    /* LINES */
    .line { display: flex; gap: 10px; line-height: 1.7; }
    .prompt { flex-shrink: 0; user-select: none; }

    /* Guide content rendered in terminal */
    .guide-output {
      padding: 4px 0 4px 20px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cccccc;
      line-height: 1.75;
      font-size: 13px;
      border-left: 1px solid var(--border);
      margin: 4px 0 4px 0;
    }
    .guide-output h1 { color: var(--text); font-size: 15px; margin-bottom: 8px; }
    .guide-output h2 { color: var(--accent); font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; margin: 16px 0 6px; }
    .guide-output h3 { color: #ddd; font-size: 13px; margin: 12px 0 4px; }
    .guide-output p { margin-bottom: 8px; color: #ccc; }
    .guide-output ul, .guide-output ol { margin: 0 0 8px 20px; }
    .guide-output li { margin-bottom: 3px; color: #ccc; }
    .guide-output pre {
      background: #000;
      border: 1px solid #222;
      border-left: 2px solid var(--accent);
      padding: 10px 14px;
      margin: 8px 0;
      overflow-x: auto;
      border-radius: 3px;
    }
    .guide-output code { font-family: var(--font); font-size: 12px; }
    .guide-output pre code { color: #d4d4d4; }
    .guide-output p code, .guide-output li code {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 2px; padding: 1px 5px;
      font-size: 12px; color: var(--accent);
    }
    .guide-output blockquote {
      border-left: 2px solid #444;
      padding: 6px 12px; margin: 8px 0;
      background: #111; color: #999; font-size: 12px;
    }
    .guide-output blockquote p { margin: 0; color: #999; }
    .guide-output table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
    .guide-output th { background: #161616; padding: 6px 10px; text-align: left; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: #666; border-bottom: 1px solid #222; }
    .guide-output td { padding: 6px 10px; border-bottom: 1px solid #1a1a1a; color: #ccc; }
    .guide-output tr:last-child td { border-bottom: none; }
    .guide-output a { color: var(--accent); text-decoration: none; }
    .guide-output hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* ls output — directory listing */
    .ls-grid {
      display: flex; flex-wrap: wrap; gap: 4px 24px;
      padding: 4px 0 4px 20px;
    }
    .ls-section {
      padding: 2px 0;
    }
    .ls-section-name {
      color: var(--blue);
      font-size: 12px;
      display: block;
      margin-bottom: 2px;
    }
    .ls-files {
      padding-left: 16px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .ls-file {
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.1s;
      line-height: 1.6;
    }
    .ls-file:hover { color: var(--accent); }

    /* clickable dirs in ls / */
    .ls-dir {
      color: var(--blue);
      cursor: pointer;
      font-size: 12px;
      line-height: 1.8;
      transition: color 0.1s;
    }
    .ls-dir:hover { color: var(--accent); }
    .ls-dir-grid {
      padding: 4px 0 4px 20px;
      display: flex; flex-direction: column; gap: 2px;
    }

    /* INPUT BAR */
    .input-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: #0d0d0d;
      flex-shrink: 0;
    }
    .input-prompt { color: var(--accent); flex-shrink: 0; user-select: none; }
    .input-bar input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font); font-size: 13px;
      color: var(--text); caret-color: var(--accent);
    }
    .input-bar input::placeholder { color: var(--text-dim); }

    .hint {
      text-align: center; font-size: 10px; color: var(--text-dim);
      padding: 4px; flex-shrink: 0; letter-spacing: 0.04em;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; animation: blink 1s step-end infinite; color: var(--accent); }

    @media (max-width: 600px) {
      .terminal { padding: 12px 14px 8px; }
      .input-bar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<div class="titlebar">
  <div class="dot" style="background:#ff5f57"></div>
  <div class="dot" style="background:#ffbd2e"></div>
  <div class="dot" style="background:#28c840"></div>
  <span class="titlebar-text">guides — bash — ~/guides</span>
</div>

<div class="terminal" id="terminal"></div>

<div class="input-bar">
  <span class="input-prompt">$</span>
  <input type="text" id="input" placeholder="ls, cd macos, cat guide-name.html, clear..." autocomplete="off" spellcheck="false">
</div>
<div class="hint">ls · cd &lt;section&gt; · cat &lt;guide&gt;.html · cd .. · clear</div>

<script src="/js/guides-data.js"></script>
<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('input');

let cwd = '/';           // '/' or '/sectionid'
let history = [];
let histIdx = -1;

// ── helpers ──────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBot() {
  terminal.scrollTop = terminal.scrollHeight;
}

function addLine(promptStr, promptColor, content) {
  const el = document.createElement('div');
  el.className = 'line';
  el.innerHTML = `<span class="prompt" style="color:${promptColor}">${esc(promptStr)}</span><span>${content}</span>`;
  terminal.appendChild(el);
  scrollBot();
}

function addRaw(html) {
  const el = document.createElement('div');
  el.innerHTML = html;
  terminal.appendChild(el);
  scrollBot();
}

function addError(msg) {
  addLine('!', '#ff6b6b', `<span style="color:#ff6b6b">${esc(msg)}</span>`);
}

function currentSection() {
  if (cwd === '/') return null;
  return SECTIONS.find(s => s.id === cwd.slice(1));
}

function prompt() {
  const path = cwd === '/' ? '~/guides' : `~/guides/${cwd.slice(1)}`;
  return path + ' $';
}

// ── commands ─────────────────────────────────────────────────────────────

function cmdLs() {
  if (cwd === '/') {
    // show all sections as directories
    const grid = document.createElement('div');
    grid.className = 'ls-dir-grid';
    SECTIONS.filter(s => s.guides.length).forEach(s => {
      const row = document.createElement('div');
      row.className = 'ls-dir';
      row.textContent = s.id + '/  ';
      row.title = s.title + ' — ' + s.guides.length + ' guides';
      row.addEventListener('click', () => {
        echoCmd('cd ' + s.id);
        cmdCd(s.id);
      });
      // add count hint
      const hint = document.createElement('span');
      hint.style.cssText = 'color:#444;font-size:11px';
      hint.textContent = '(' + s.guides.length + ')';
      row.appendChild(hint);
      grid.appendChild(row);
    });
    terminal.appendChild(grid);
    scrollBot();
  } else {
    const sec = currentSection();
    if (!sec) { addError('no such section'); return; }
    const wrap = document.createElement('div');
    wrap.className = 'ls-files';
    sec.guides.forEach(g => {
      const el = document.createElement('div');
      el.className = 'ls-file';
      el.textContent = g.slug + '.html';
      el.addEventListener('click', () => {
        echoCmd('cat ' + g.slug + '.html');
        catGuide(g.slug);
      });
      wrap.appendChild(el);
    });
    terminal.appendChild(wrap);
    scrollBot();
  }
}

function cmdCd(arg) {
  if (!arg || arg === '~' || arg === '/') { cwd = '/'; return; }
  if (arg === '..') { cwd = '/'; return; }
  const sec = SECTIONS.find(s => s.id === arg || s.title.toLowerCase() === arg.toLowerCase());
  if (!sec) { addError(`cd: ${arg}: no such section`); return; }
  cwd = '/' + sec.id;
  // auto-run ls
  echoCmd('ls');
  cmdLs();
}

async function catGuide(slug) {
  // find the guide
  const guide = ALL_GUIDES.find(g => g.slug === slug);
  if (!guide) { addError(`cat: ${slug}.html: no such file`); return; }

  addLine('→', '#444', `<span style="color:#444">fetching ${esc(slug)}.html...</span>`);

  try {
    const resp = await fetch(`/guides/${slug}.html`);
    if (!resp.ok) throw new Error('404');
    const raw = await resp.text();
    // strip DATA: first line
    const html = raw.split('\n').slice(1).join('\n');

    const div = document.createElement('div');
    div.className = 'guide-output';
    div.innerHTML = html;
    // remove the last 'fetching' line
    terminal.lastElementChild && terminal.lastElementChild.remove();
    terminal.appendChild(div);
    scrollBot();
  } catch(e) {
    terminal.lastElementChild && terminal.lastElementChild.remove();
    addError(`cat: ${slug}.html: failed to load`);
  }
}

function cmdClear() {
  terminal.innerHTML = '';
}

function cmdHelp() {
  const help = [
    ['ls', 'list sections or guides in current section'],
    ['cd &lt;section&gt;', 'enter a section (e.g. cd macos)'],
    ['cd ..', 'go back to root'],
    ['cat &lt;guide&gt;.html', 'read a guide'],
    ['clear', 'clear the terminal'],
    ['help', 'show this message'],
  ];
  const rows = help.map(([cmd, desc]) =>
    `<span style="color:var(--accent);min-width:220px;display:inline-block">${cmd}</span><span style="color:#888">${desc}</span>`
  ).join('<br>');
  addRaw(`<div style="padding:4px 0 4px 20px;line-height:2;font-size:12px">${rows}</div>`);
}

// ── echo typed command ───────────────────────────────────────────────────

function echoCmd(cmd) {
  addLine(prompt(), '#00ff87', `<span style="color:var(--blue)">${esc(cmd)}</span>`);
}

// ── parse and dispatch ───────────────────────────────────────────────────

function run(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  history.unshift(cmd);
  histIdx = -1;
  echoCmd(cmd);

  const parts = cmd.split(/\s+/);
  const verb = parts[0].toLowerCase();
  const arg  = parts.slice(1).join(' ').replace(/\.html$/, '');

  if (verb === 'ls' || verb === 'dir') {
    cmdLs();
  } else if (verb === 'cd') {
    cmdCd(arg);
  } else if (verb === 'cat' || verb === 'open' || verb === 'read') {
    if (!arg) { addError('cat: missing filename'); return; }
    // if we're in a section and they type just the slug, look up full path
    catGuide(arg);
  } else if (verb === 'clear' || verb === 'cls') {
    cmdClear();
  } else if (verb === 'help' || verb === 'man' || verb === '?') {
    cmdHelp();
  } else if (verb === 'pwd') {
    addLine('→', '#444', `<span style="color:#ccc">${cwd === '/' ? '~/guides' : '~/guides/' + cwd.slice(1)}</span>`);
  } else if (verb === 'exit' || verb === 'quit') {
    addLine('→', '#444', '<span style="color:#666">there is no exit.</span>');
  } else {
    addError(`command not found: ${cmd}  (try: ls, cd, cat, help)`);
  }
}

// ── input handling ───────────────────────────────────────────────────────

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    run(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      input.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    // tab completion
    const partial = input.value.trim();
    const parts = partial.split(/\s+/);
    const verb = parts[0].toLowerCase();
    const fragment = parts[parts.length - 1].toLowerCase();

    if ((verb === 'cd') && parts.length >= 2) {
      const match = SECTIONS.find(s => s.id.startsWith(fragment));
      if (match) input.value = 'cd ' + match.id;
    } else if ((verb === 'cat' || verb === 'open') && parts.length >= 2) {
      const sec = currentSection();
      const pool = sec ? sec.guides : ALL_GUIDES;
      const match = pool.find(g => g.slug.startsWith(fragment));
      if (match) input.value = verb + ' ' + match.slug + '.html';
    } else if (!parts[1]) {
      // complete verb
      const verbs = ['ls','cd','cat','clear','help','pwd'];
      const m = verbs.find(v => v.startsWith(fragment));
      if (m) input.value = m;
    }
  }
});

// ── boot sequence ────────────────────────────────────────────────────────

function boot() {
  const lines = [
    { t: 300,  fn: () => addLine('$', '#00ff87', '<span style="color:var(--blue)">guides --start</span>') },
    { t: 600,  fn: () => addLine('→', '#444', '<span style="color:#666">OS & Installation Guides — ' + ALL_GUIDES.length + ' guides</span>') },
    { t: 800,  fn: () => addLine('→', '#444', '<span style="color:#666">type <span style="color:var(--accent)">ls</span> to browse, <span style="color:var(--accent)">help</span> for commands</span>') },
    { t: 1000, fn: () => addLine('', '', '') },
    { t: 1100, fn: () => { echoCmd('ls'); cmdLs(); } },
  ];
  lines.forEach(({ t, fn }) => setTimeout(fn, t));
  setTimeout(() => input.focus(), 1200);
}

boot();
</script>
</body>
</html>
