<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guides — AI terminal</title>
  <meta name="description" content="Ask anything about macOS, Linux, Windows, servers, and installation.">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111;
      --border: #222;
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #444;
      --accent: #00ff87;
      --blue: #5ccfe6;
      --red: #ff6b6b;
      --yellow: #ffd060;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* TITLEBAR */
    .titlebar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .title-text {
      font-size: 11px; color: var(--text-dim);
      margin-left: 6px; letter-spacing: 0.05em;
    }

    /* TERMINAL OUTPUT */
    .output {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }
    .output::-webkit-scrollbar { width: 4px; }
    .output::-webkit-scrollbar-thumb { background: #222; }

    .line {
      display: flex; gap: 10px;
      margin-bottom: 4px;
      line-height: 1.7;
      font-size: 13px;
    }

    .prompt { color: var(--accent); flex-shrink: 0; user-select: none; }
    .user-text { color: var(--blue); }
    .ai-text { color: #cccccc; white-space: pre-wrap; word-break: break-word; }
    .system-text { color: var(--text-muted); }
    .error-text { color: var(--red); }

    .thinking {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 4px; color: var(--text-dim);
    }
    .thinking-dots span {
      animation: blink 1s step-end infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .ai-block { margin-bottom: 16px; }
    .ai-block .prompt { margin-top: 0; }

    /* INPUT BAR */
    .input-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      background: #0d0d0d;
      flex-shrink: 0;
    }
    .input-prompt { color: var(--accent); flex-shrink: 0; }
    .input-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      caret-color: var(--accent);
    }
    .input-bar input::placeholder { color: var(--text-dim); }
    .send-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); font-family: var(--font);
      font-size: 11px; padding: 4px 10px;
      cursor: pointer; border-radius: 3px;
      letter-spacing: 0.04em;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { color: var(--accent); border-color: var(--accent); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* hint bar */
    .hint {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      padding: 5px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      .output { padding: 14px 16px; }
      .input-bar { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<div class="titlebar">
  <div class="dot" style="background:#ff5f57"></div>
  <div class="dot" style="background:#ffbd2e"></div>
  <div class="dot" style="background:#28c840"></div>
  <span class="title-text">guides — ai terminal</span>
</div>

<div class="output" id="output"></div>

<div class="input-bar">
  <span class="input-prompt">$</span>
  <input type="text" id="input" placeholder="ask anything about macOS, Linux, servers, networking..." autocomplete="off" spellcheck="false">
  <button class="send-btn" id="send-btn">enter</button>
</div>
<div class="hint">↑↓ history &nbsp;·&nbsp; enter to send &nbsp;·&nbsp; powered by llama 3.1 on cloudflare</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

let messages = [];
let historyIndex = -1;
let inputHistory = [];
let isThinking = false;

function appendLine(promptChar, promptColor, text, textClass, container) {
  const el = container || output;
  const line = document.createElement('div');
  line.className = 'line';
  line.innerHTML = `<span class="prompt" style="color:${promptColor}">${promptChar}</span><span class="${textClass}">${escHtml(text)}</span>`;
  el.appendChild(line);
  scrollToBottom();
  return line;
}

function appendAI(text) {
  const block = document.createElement('div');
  block.className = 'ai-block';
  const line = document.createElement('div');
  line.className = 'line';
  line.innerHTML = `<span class="prompt" style="color:#444">→</span><span class="ai-text"></span>`;
  block.appendChild(line);
  output.appendChild(block);

  // typewriter
  const span = line.querySelector('.ai-text');
  let i = 0;
  const speed = text.length > 400 ? 8 : 18;
  const timer = setInterval(() => {
    if (i < text.length) {
      span.textContent += text[i];
      i++;
      scrollToBottom();
    } else {
      clearInterval(timer);
    }
  }, Math.max(2, Math.floor(1000 / (speed * 10))));
}

function showThinking() {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinking';
  el.innerHTML = `<span style="color:#444">→</span><span class="thinking-dots" style="color:#444"><span>.</span><span>.</span><span>.</span></span>`;
  output.appendChild(el);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function scrollToBottom() {
  output.scrollTop = output.scrollHeight;
}

function escHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Welcome message
function showWelcome() {
  const lines = [
    { p: '$', pc: '#00ff87', t: 'guides --start', tc: 'user-text' },
  ];

  setTimeout(() => {
    appendLine('$', '#00ff87', 'guides --start', 'user-text');
  }, 200);

  setTimeout(() => {
    appendLine('→', '#444', '', 'ai-text');
    const welcome = [
      'welcome to guides.',
      '',
      'ask me anything about macOS, Linux, Windows,',
      'servers, networking, security, or installation.',
      '',
      'i know what i know — and i\'ll be honest when i don\'t.',
    ];
    let delay = 0;
    welcome.forEach(line => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = `<span class="prompt" style="color:transparent">→</span><span class="ai-text">${escHtml(line)}</span>`;
        output.appendChild(div);
        scrollToBottom();
      }, delay);
      delay += line ? 80 : 40;
    });
  }, 500);
}

async function send() {
  const text = input.value.trim();
  if (!text || isThinking) return;

  input.value = '';
  historyIndex = -1;
  inputHistory.unshift(text);

  appendLine('$', '#00ff87', text, 'user-text');

  messages.push({ role: 'user', content: text });
  isThinking = true;
  sendBtn.disabled = true;
  showThinking();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    const data = await res.json();
    removeThinking();

    if (data.error) {
      appendLine('!', '#ff6b6b', 'error: ' + data.error, 'error-text');
    } else {
      const reply = data.response || '';
      messages.push({ role: 'assistant', content: reply });
      appendAI(reply);
    }
  } catch (err) {
    removeThinking();
    appendLine('!', '#ff6b6b', 'connection error — is the worker deployed?', 'error-text');
  } finally {
    isThinking = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// Event listeners
sendBtn.addEventListener('click', send);

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    send();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < inputHistory.length - 1) {
      historyIndex++;
      input.value = inputHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = inputHistory[historyIndex];
    } else {
      historyIndex = -1;
      input.value = '';
    }
  }
});

// Start
showWelcome();
input.focus();
</script>
</body>
</html>
