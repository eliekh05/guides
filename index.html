<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guides</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="/js/xterm/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0a0a; }
    body { display: flex; flex-direction: column; }

#terminal-container {
      flex: 1;
      overflow: hidden;
      padding: 6px 4px 4px 4px;
    }

    /* Override xterm default background */
    .xterm { height: 100%; }
    .xterm-viewport { background: #0a0a0a !important; }
    .xterm-screen canvas { background: #0a0a0a !important; }
  </style>
</head>
<body>

<div id="terminal-container"></div>

<script src="/js/xterm/xterm.js"></script>
<script src="/js/xterm/addon-fit.js"></script>
  <script src="/js/xterm/addon-web-links.js"></script>
<script src="/js/guides-data.js"></script>
<script>
// ── Setup xterm ────────────────────────────────────────────────────────────

const term = new Terminal({
  fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace",
  fontSize: 13,
  lineHeight: 1.5,
  cursorBlink: true,
  cursorStyle: 'block',
  theme: {
    background:   '#0a0a0a',
    foreground:   '#e0e0e0',
    cursor:       '#00cc66',
    cursorAccent: '#0a0a0a',
    black:        '#0a0a0a',
    brightBlack:  '#333333',
    white:        '#e0e0e0',
    brightWhite:  '#f0f0f0',
    green:        '#00cc66',
    brightGreen:  '#00ff87',
    cyan:         '#79d4f0',
    brightCyan:   '#79d4f0',
    red:          '#ff6b6b',
    brightRed:    '#ff6b6b',
    yellow:       '#ffd060',
    blue:         '#79d4f0',
    magenta:      '#c792ea',
  },
  allowTransparency: false,
  scrollback: 5000,
  convertEol: true,
});

const fitAddon = new FitAddon.FitAddon();
const webLinksAddon = new WebLinksAddon.WebLinksAddon();
term.loadAddon(fitAddon);
term.loadAddon(webLinksAddon);
term.open(document.getElementById('terminal-container'));
fitAddon.fit();

window.addEventListener('resize', () => fitAddon.fit());

// ── Colors ─────────────────────────────────────────────────────────────────
const C = {
  reset:  '\x1b[0m',
  green:  '\x1b[32m',
  cyan:   '\x1b[36m',
  bCyan:  '\x1b[96m',
  red:    '\x1b[31m',
  dim:    '\x1b[2m',
  bold:   '\x1b[1m',
  yellow: '\x1b[33m',
  white:  '\x1b[37m',
};

function g(color, text) { return color + text + C.reset; }

// ── State ──────────────────────────────────────────────────────────────────
let cwd     = '/';
let inputBuf = '';
let history  = [];
let histIdx  = -1;
let busy     = false;   // true while loading a guide

// ── Terminal write helpers ─────────────────────────────────────────────────
function write(s)   { term.write(s); }
function writeln(s) { term.writeln(s); }
function crlf()     { term.writeln(''); }

function promptStr() {
  const path = cwd === '/' ? '~/guides' : `~/guides/${cwd.slice(1)}`;
  return g(C.green, path + ' $') + ' ';
}

function writePrompt() {
  write(promptStr());
}

function echoCmd(cmd) {
  writeln(promptStr() + g(C.cyan, cmd));
}

function writeError(msg) {
  writeln(g(C.red, msg));
}

// ── Strip HTML to plain text for xterm ────────────────────────────────────
function htmlToAnsi(html) {
  // Create a DOM element to parse HTML
  const div = document.createElement('div');
  div.innerHTML = html;

  function nodeToText(node) {
    if (node.nodeType === 3) return node.textContent; // text node

    const tag = node.tagName ? node.tagName.toLowerCase() : '';
    const children = Array.from(node.childNodes).map(nodeToText).join('');

    switch(tag) {
      case 'h1': return '\r\n' + C.bold + C.white + children + C.reset + '\r\n' + '─'.repeat(Math.min(children.length, 60)) + '\r\n';
      case 'h2': return '\r\n' + C.green + children.toUpperCase() + C.reset + '\r\n';
      case 'h3': return '\r\n' + C.bold + children + C.reset + '\r\n';
      case 'p':  return children + '\r\n';
      case 'li': return '  · ' + children + '\r\n';
      case 'ul': case 'ol': return children;
      case 'code':
        if (node.closest && node.closest('pre')) return children;
        return g(C.green, children);
      case 'pre': return '\r\n' + children.split('\n').map(l => g(C.dim,'  ') + g(C.bCyan, l)).join('\r\n') + '\r\n';
      case 'strong': case 'b': return C.bold + children + C.reset;
      case 'em': case 'i': return children;
      case 'blockquote': return g(C.dim, '  ▌ ' + children.trim()) + '\r\n';
      case 'br': return '\r\n';
      case 'hr': return g(C.dim, '─'.repeat(40)) + '\r\n';
      case 'a': {
        const href = node.getAttribute && node.getAttribute('href');
        if (href && href.startsWith('magnet:')) {
          // Magnet links — render as copyable text with indicator
          return g(C.yellow, '[magnet] ') + g(C.cyan, href);
        }
        return g(C.cyan, children);
      }
      case 'th': return g(C.dim, children.toUpperCase().padEnd(20));
      case 'td': return children.padEnd(20);
      case 'tr': return children + '\r\n';
      case 'table': return '\r\n' + children + '\r\n';
      case 'thead': return g(C.dim, children);
      case 'tbody': return children;
      default: return children;
    }
  }

  return nodeToText(div);
}

// ── Commands ───────────────────────────────────────────────────────────────

function currentSection() {
  return cwd === '/' ? null : SECTIONS.find(s => s.id === cwd.slice(1));
}

function cmdLs() {
  if (cwd === '/') {
    SECTIONS.filter(s => s.guides.length).forEach(s => {
      writeln(g(C.cyan, s.id + '/') + g(C.dim, '  ' + s.guides.length));
    });
  } else {
    const sec = currentSection();
    if (!sec) { writeError('ls: no such section'); return; }
    sec.guides.forEach(g2 => writeln(g2.slug + '.html'));
  }
}

function cmdCd(arg) {
  if (!arg || arg === '~' || arg === '/' || arg === '..') {
    cwd = '/'; return;
  }
  const sec = SECTIONS.find(s =>
    s.id === arg || s.title.toLowerCase() === arg.toLowerCase()
  );
  if (!sec) { writeError(`cd: ${arg}: no such section`); return; }
  cwd = '/' + sec.id;
  crlf();
  echoCmd('ls');
  cmdLs();
}

async function catGuide(slug) {
  const guide = ALL_GUIDES.find(g2 => g2.slug === slug);
  if (!guide) { writeError(`cat: ${slug}.html: no such file`); return; }

  busy = true;

  try {
    const resp = await fetch(`/guides/${slug}.html`);
    if (!resp.ok) throw new Error();
    const raw  = await resp.text();
    const html = raw.split('\n').slice(2).join('\n');
    const text = htmlToAnsi(html);

    // Clear fully, then write from top
    term.reset();
    echoCmd('cat ' + slug + '.html');
    crlf();
    text.split('\r\n').forEach(line => writeln(line));
    // Force scroll to very top after all content written
    requestAnimationFrame(() => term.scrollToTop());
  } catch(e) {
    term.reset();
    writeError(`cat: ${slug}.html: failed to load`);
  } finally {
    busy = false;
    crlf();
    writePrompt();
    inputBuf = '';
  }
}

function cmdHelp() {
  const rows = [
    ['ls',               'list sections or guides'],
    ['cd <section>',     'enter a section'],
    ['cd ..',            'back to root'],
    ['cat <file>.html',  'open a guide'],
    ['github',           'open GitHub repo'],
    ['clear',            'clear screen'],
    ['help',             'show this'],
  ];
  crlf();
  rows.forEach(([cmd, desc]) => {
    writeln(g(C.green, cmd.padEnd(22)) + g(C.dim, desc));
  });
  crlf();
}

function runCmd(raw) {
  if (busy) return;
  const cmd  = raw.trim();
  crlf();
  if (!cmd) { writePrompt(); inputBuf = ''; return; }

  history.unshift(cmd);
  histIdx = -1;

  const parts = cmd.split(/\s+/);
  const verb  = parts[0].toLowerCase();
  const arg   = parts.slice(1).join(' ').replace(/\.html$/, '').trim();

  switch(verb) {
    case 'ls': case 'dir':
      echoCmd(cmd); crlf(); cmdLs(); crlf(); break;

    case 'cd':
      echoCmd(cmd); cmdCd(arg); crlf(); break;

    case 'cat': case 'open': case 'read':
      if (!arg) { echoCmd(cmd); writeError('cat: missing filename'); crlf(); break; }
      catGuide(arg); return; // catGuide writes its own prompt

    case 'clear': case 'cls':
      term.clear(); break;

    case 'help': case '?':
      echoCmd(cmd); cmdHelp(); break;

    case 'github': case 'gh':
      echoCmd(cmd);
      writeln(g(C.cyan, 'opening github.com/eliekh05/guides...'));
      crlf();
      setTimeout(() => window.open('https://github.com/eliekh05/guides', '_blank'), 300);
      break;

    case 'pwd':
      echoCmd(cmd);
      writeln(cwd === '/' ? '~/guides' : `~/guides/${cwd.slice(1)}`);
      crlf(); break;

    case 'exit': case 'quit':
      echoCmd(cmd);
      writeln(g(C.dim, 'there is no exit.'));
      crlf(); break;

    default:
      echoCmd(cmd);
      writeError(`${verb}: command not found  (try: ls  cd  cat  help)`);
      crlf(); break;
  }

  writePrompt();
  inputBuf = '';
}

// ── Tab completion ─────────────────────────────────────────────────────────
function tabComplete() {
  const parts    = inputBuf.trim().split(/\s+/);
  const verb     = parts[0].toLowerCase();
  const fragment = (parts[parts.length - 1] || '').toLowerCase();

  let completed = null;

  if (verb === 'cd' && parts.length >= 2) {
    const m = SECTIONS.find(s => s.id.startsWith(fragment));
    if (m) completed = 'cd ' + m.id;
  } else if ((verb === 'cat' || verb === 'open') && parts.length >= 2) {
    const pool = currentSection()?.guides || ALL_GUIDES;
    const m    = pool.find(g2 => g2.slug.startsWith(fragment));
    if (m) completed = verb + ' ' + m.slug + '.html';
  } else if (parts.length === 1) {
    const verbs = ['ls','cd','cat','clear','help','pwd','github'];
    const m = verbs.find(v => v.startsWith(fragment));
    if (m) completed = m;
  }

  if (completed && completed !== inputBuf) {
    // Clear current input and write completion
    write('\b \b'.repeat(inputBuf.length));
    write(completed);
    inputBuf = completed;
  }
}

// ── Input handling via xterm onData ───────────────────────────────────────
term.onData(e => {
  if (busy) return;

  if (e === '\r') {                          // Enter
    runCmd(inputBuf);
  } else if (e === '\x7f') {                 // Backspace
    if (inputBuf.length > 0) {
      inputBuf = inputBuf.slice(0, -1);
      write('\b \b');
    }
  } else if (e === '\t') {                   // Tab
    tabComplete();
  } else if (e === '\x1b[A') {              // Arrow up
    if (histIdx < history.length - 1) {
      histIdx++;
      write('\b \b'.repeat(inputBuf.length));
      inputBuf = history[histIdx];
      write(inputBuf);
    }
  } else if (e === '\x1b[B') {              // Arrow down
    if (histIdx > 0) {
      histIdx--;
      write('\b \b'.repeat(inputBuf.length));
      inputBuf = history[histIdx];
      write(inputBuf);
    } else {
      write('\b \b'.repeat(inputBuf.length));
      histIdx  = -1;
      inputBuf = '';
    }
  } else if (e === '\x01') {                 // Ctrl+A — start of line
    write('\b \b'.repeat(inputBuf.length));
    inputBuf = '';
  } else if (e === '\x0c') {                 // Ctrl+L — clear
    term.clear();
    writePrompt();
    inputBuf = '';
  } else if (e >= ' ' || e === '\x1b') {    // Printable chars
    if (e.length === 1 && e >= ' ') {
      inputBuf += e;
      write(e);
    }
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
(function boot() {
  setTimeout(() => {
    writeln(g(C.green, '$') + ' ' + g(C.cyan, 'guides --start'));
    writeln(g(C.dim, ALL_GUIDES.length + ' guides  —  type ') + g(C.green, 'ls') + g(C.dim, ' to browse  ·  ') + g(C.green, 'help') + g(C.dim, ' for commands'));
    crlf();
    echoCmd('ls');
    crlf();
    cmdLs();
    crlf();
    writePrompt();
  }, 100);
})();
</script>
</body>
</html>
