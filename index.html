<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OS & Installation Guides</title>
  <meta name="description" content="Practical guides for problems that are hard to find solutions for online.">
  <link rel="stylesheet" href="css/style.css">

<div id="search-results" class="search-results"></div>

<!-- LAYOUT -->

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">

  </nav>
