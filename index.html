<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guides</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="/js/xterm/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0a0a; }
    body { display: flex; flex-direction: column; }
    #terminal-container { flex: 1; overflow: hidden; padding: 6px 4px 4px 4px; }
    .xterm { height: 100%; }
    .xterm-viewport { background: #0a0a0a !important; }
  </style>
</head>
<body>
<div id="terminal-container"></div>
<script src="/js/xterm/xterm.js"></script>
<script src="/js/xterm/addon-fit.js"></script>
<script src="/js/xterm/addon-web-links.js"></script>
<script src="/js/guides-data.js"></script>
<script>
const term = new Terminal({
  fontFamily: "'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Consolas,monospace",
  fontSize: 13,
  lineHeight: 1.5,
  cursorBlink: true,
  cursorStyle: 'block',
  scrollback: 5000,
  convertEol: true,
  theme: {
    background:  '#0a0a0a', foreground:  '#e0e0e0',
    cursor:      '#00cc66', cursorAccent:'#0a0a0a',
    black:       '#0a0a0a', brightBlack: '#333',
    white:       '#e0e0e0', brightWhite: '#f0f0f0',
    green:       '#00cc66', brightGreen: '#00ff87',
    cyan:        '#79d4f0', brightCyan:  '#79d4f0',
    red:         '#ff6b6b', brightRed:   '#ff6b6b',
    yellow:      '#ffd060', blue:        '#79d4f0',
    magenta:     '#c792ea',
  },
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.loadAddon(new WebLinksAddon.WebLinksAddon());
term.open(document.getElementById('terminal-container'));
fitAddon.fit();
window.addEventListener('resize', () => fitAddon.fit());

// ── ANSI helpers ──────────────────────────────────────────────────────────
const R = '\x1b[0m';
const DIM = '\x1b[2m', BOLD = '\x1b[1m';
const GREEN = '\x1b[32m', CYAN = '\x1b[36m', BCYAN = '\x1b[96m';
const RED = '\x1b[31m', YELLOW = '\x1b[33m', WHITE = '\x1b[37m';

const dim   = s => DIM  + s + R;
const bold  = s => BOLD + s + R;
const green = s => GREEN + s + R;
const cyan  = s => CYAN  + s + R;
const bcyan = s => BCYAN + s + R;
const red   = s => RED   + s + R;
const yellow= s => YELLOW+ s + R;

const wl  = s => term.writeln(s);
const w   = s => term.write(s);
const nl  = ()=> term.writeln('');

// ── State ─────────────────────────────────────────────────────────────────
let cwd     = '/';
let inputBuf = '';
let cmdHistory = [];
let histIdx = -1;
let busy = false;

// ── Prompt ────────────────────────────────────────────────────────────────
function promptStr() {
  return green(cwd === '/' ? '$' : cwd.slice(1) + ' $') + ' ';
}
function writePrompt() { w(promptStr()); }
function echoCmd(cmd)  { wl(promptStr() + cyan(cmd)); }
function writeError(msg) { wl(red(msg)); }

// ── HTML → ANSI ───────────────────────────────────────────────────────────
function htmlToAnsi(html) {
  const div = document.createElement('div');
  div.innerHTML = html;

  function walk(node) {
    if (node.nodeType === 3) return node.textContent;
    const tag = (node.tagName || '').toLowerCase();
    const ch  = Array.from(node.childNodes).map(walk).join('');

    switch(tag) {
      case 'h1': return '\r\n' + bold(WHITE + ch + R) + '\r\n' + dim('─'.repeat(Math.min(ch.length, 56))) + '\r\n';
      case 'h2': return '\r\n' + green(ch.toUpperCase()) + '\r\n';
      case 'h3': return '\r\n' + bold(ch) + '\r\n';
      case 'p':  return ch + '\r\n';
      case 'ul': case 'ol': return ch;
      case 'li': return '  ' + dim('·') + ' ' + ch + '\r\n';
      case 'code':
        return node.closest && node.closest('pre') ? ch : green(ch);
      case 'pre':
        return '\r\n' + ch.split('\n').map(l => '  ' + bcyan(l)).join('\r\n') + '\r\n';
      case 'strong': case 'b': return bold(ch);
      case 'em': case 'i':     return ch;
      case 'blockquote': return dim('  | ' + ch.trim()) + '\r\n';
      case 'br':  return '\r\n';
      case 'hr':  return dim('─'.repeat(40)) + '\r\n';
      case 'a': {
        const href = node.getAttribute && node.getAttribute('href');
        if (href && href.startsWith('magnet:')) return yellow('[magnet] ') + cyan(href);
        return cyan(ch);
      }
      case 'th':    return dim(ch.toUpperCase().padEnd(22));
      case 'td':    return ch.padEnd(22);
      case 'tr':    return ch + '\r\n';
      case 'table': return '\r\n' + ch + '\r\n';
      case 'thead': return dim(ch);
      case 'tbody': return ch;
      default: return ch;
    }
  }
  return walk(div);
}

// ── Commands ──────────────────────────────────────────────────────────────
function currentSection() {
  return cwd === '/' ? null : SECTIONS.find(s => s.id === cwd.slice(1));
}

function cmdLs() {
  if (cwd === '/') {
    SECTIONS.filter(s => s.guides.length).forEach(s => {
      wl(cyan(s.id + '/') + dim('  ' + s.guides.length));
    });
  } else {
    const sec = currentSection();
    if (!sec) { writeError('ls: no such section'); return; }
    // Show guide titles, not slugs
    sec.guides.forEach(g => {
      wl(dim(g.slug.padEnd(52)) + ' ' + g.title);
    });
  }
}

function cmdCd(arg) {
  if (!arg || arg === '~' || arg === '/' || arg === '..') {
    cwd = '/'; return;
  }
  const sec = SECTIONS.find(s =>
    s.id === arg || s.title.toLowerCase() === arg.toLowerCase()
  );
  if (!sec) { writeError(`cd: ${arg}: no such section`); return; }
  cwd = '/' + sec.id;
  nl();
  echoCmd('ls');
  nl();
  cmdLs();
}

async function catGuide(slug) {
  // Accept slug or title match
  let guide = ALL_GUIDES.find(g => g.slug === slug);
  if (!guide) { writeError(`cat: ${slug}: no such guide`); return; }

  busy = true;
  try {
    const resp = await fetch(`/guides/${guide.slug}.html`);
    if (!resp.ok) throw new Error();
    const raw  = await resp.text();
    const html = raw.split('\n').slice(2).join('\n');
    const text = htmlToAnsi(html);

    term.reset();
    echoCmd('cat ' + guide.slug + '.html');
    nl();
    text.split('\r\n').forEach(line => wl(line));
    requestAnimationFrame(() => term.scrollToTop());
  } catch(e) {
    term.reset();
    writeError(`cat: failed to load ${guide.slug}.html`);
  } finally {
    busy = false;
    nl();
    writePrompt();
    inputBuf = '';
  }
}

function cmdHelp() {
  nl();
  [
    ['ls',              'list sections or guides'],
    ['cd <section>',    'enter a section — e.g. cd macos'],
    ['cd ..',           'back to root'],
    ['cat <slug>',      'open a guide'],
    ['github',          'open the GitHub repo'],
    ['clear',           'clear screen'],
    ['help',            'show this'],
  ].forEach(([cmd, desc]) => wl(green(cmd.padEnd(20)) + dim(desc)));
  nl();
}

// ── Dispatch ──────────────────────────────────────────────────────────────
function runCmd(raw) {
  if (busy) return;
  const cmd  = raw.trim();
  nl();
  if (!cmd) { writePrompt(); inputBuf = ''; return; }

  cmdHistory.unshift(cmd);
  histIdx = -1;

  const parts = cmd.split(/\s+/);
  const verb  = parts[0].toLowerCase();
  const arg   = parts.slice(1).join(' ').replace(/\.html$/, '').trim();

  switch(verb) {
    case 'ls': case 'dir':
      echoCmd(cmd); nl(); cmdLs(); break;

    case 'cd':
      echoCmd(cmd); cmdCd(arg); break;

    case 'cat': case 'open': case 'read':
      if (!arg) { echoCmd(cmd); writeError('cat: missing filename'); break; }
      catGuide(arg); return;

    case 'clear': case 'cls':
      term.reset(); writePrompt(); inputBuf = ''; return;

    case 'help': case '?':
      echoCmd(cmd); cmdHelp(); break;

    case 'github': case 'gh':
      echoCmd(cmd);
      wl(cyan('opening github.com/eliekh05/guides...'));
      setTimeout(() => window.open('https://github.com/eliekh05/guides', '_blank'), 300);
      break;

    case 'pwd':
      echoCmd(cmd);
      wl(cwd === '/' ? '/' : '/' + cwd.slice(1));
      break;

    case 'exit': case 'quit':
      echoCmd(cmd); wl(dim('there is no exit.')); break;

    default:
      echoCmd(cmd);
      writeError(`${verb}: command not found  (try: ls  cd  cat  help)`);
      break;
  }

  nl();
  writePrompt();
  inputBuf = '';
}

// ── Tab completion ────────────────────────────────────────────────────────
function tabComplete() {
  const parts    = inputBuf.trim().split(/\s+/);
  const verb     = parts[0].toLowerCase();
  const fragment = (parts[parts.length - 1] || '').toLowerCase();
  let completed  = null;

  if (verb === 'cd' && parts.length >= 2) {
    const m = SECTIONS.find(s => s.id.startsWith(fragment));
    if (m) completed = 'cd ' + m.id;
  } else if ((verb === 'cat' || verb === 'open') && parts.length >= 2) {
    const pool = currentSection()?.guides || ALL_GUIDES;
    const m    = pool.find(g => g.slug.startsWith(fragment));
    if (m) completed = verb + ' ' + m.slug;
  } else if (parts.length === 1) {
    const m = ['ls','cd','cat','clear','help','pwd','github'].find(v => v.startsWith(fragment));
    if (m) completed = m;
  }

  if (completed && completed !== inputBuf) {
    w('\b \b'.repeat(inputBuf.length));
    w(completed);
    inputBuf = completed;
  }
}

// ── Input ─────────────────────────────────────────────────────────────────
term.onData(e => {
  if (busy) return;
  if (e === '\r') {
    runCmd(inputBuf);
  } else if (e === '\x7f') {
    if (inputBuf.length > 0) { inputBuf = inputBuf.slice(0,-1); w('\b \b'); }
  } else if (e === '\t') {
    tabComplete();
  } else if (e === '\x1b[A') {
    if (histIdx < cmdHistory.length - 1) {
      histIdx++; w('\b \b'.repeat(inputBuf.length)); w(cmdHistory[histIdx]); inputBuf = cmdHistory[histIdx];
    }
  } else if (e === '\x1b[B') {
    if (histIdx > 0) {
      histIdx--; w('\b \b'.repeat(inputBuf.length)); w(cmdHistory[histIdx]); inputBuf = cmdHistory[histIdx];
    } else {
      w('\b \b'.repeat(inputBuf.length)); histIdx = -1; inputBuf = '';
    }
  } else if (e === '\x01') {
    w('\b \b'.repeat(inputBuf.length)); inputBuf = '';
  } else if (e === '\x0c') {
    term.reset(); writePrompt(); inputBuf = '';
  } else if (e.length === 1 && e >= ' ') {
    inputBuf += e; w(e);
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────
setTimeout(() => {
  wl(green('$') + ' ' + cyan('guides --start'));
  wl(dim(ALL_GUIDES.length + ' guides — ls to browse · help for commands'));
  nl();
  echoCmd('ls');
  nl();
  cmdLs();
  nl();
  writePrompt();
}, 100);
</script>
</body>
</html>
